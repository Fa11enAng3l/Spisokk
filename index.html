<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchList</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --bg-color: #0d0a15; --emerald: #00e676; --purple: #9d4edd; --card-bg: rgba(30, 20, 45, 0.7); }
        body { margin: 0; padding: 20px; font-family: sans-serif; background: var(--bg-color); color: #fff; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; }
        h1 { text-align: center; color: #fff; font-size: 2.5rem; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 10px var(--emerald); margin-bottom: 20px; }
        .category-block { background: var(--card-bg); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { color: var(--emerald); }
        .item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        button { background: transparent; border: 1px solid var(--emerald); color: var(--emerald); padding: 4px 8px; border-radius: 4px; cursor: pointer; }
        button.delete { border-color: #ff5252; color: #ff5252; }
        input { padding: 8px; border-radius: 5px; border: none; background: rgba(255,255,255,0.1); color: #fff; width: 100%; margin-bottom: 10px; }
        .add-btn { background: var(--emerald); color: #000; font-weight: bold; width: 100%; border: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WatchList</h1>
        <div id="app">Загрузка данных...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTtkGKIVzdK9rk-9HqXBa9hYdzH-n7Dh0",
            authDomain: "watchlist-5c90e.firebaseapp.com",
            projectId: "watchlist-5c90e",
            storageBucket: "watchlist-5c90e.firebasestorage.app",
            messagingSenderId: "410347694098",
            appId: "1:410347694098:web:3539875f65d638a5f790cb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function render(data) {
            const app = document.getElementById('app');
            app.innerHTML = '';
            ["Фильмы", "Аниме", "Сериалы"].forEach(cat => {
                const list = data[cat] || [];
                const section = document.createElement('div');
                section.className = 'category-block';
                section.innerHTML = `<h2>${cat}</h2>` + 
                    list.map((item, idx) => `
                        <div class="item">
                            <span>${item}</span>
                            <button class="delete" onclick="deleteItem('${cat}', ${idx})">Удалить</button>
                        </div>`).join('') +
                    `<input type="text" id="input-${cat}" placeholder="Добавить...">
                     <button class="add-btn" onclick="addItem('${cat}')">Добавить в ${cat}</button>`;
                app.appendChild(section);
            });
        }

        db.collection("watchlist").doc("myList").onSnapshot((doc) => {
            if (doc.exists) {
                render(doc.data());
            } else {
                // Если пусто, создаем структуру
                db.collection("watchlist").doc("myList").set({
                    "Фильмы": [], "Аниме": [], "Сериалы": []
                });
            }
        });

        function addItem(cat) {
            const val = document.getElementById(`input-${cat}`).value;
            if (!val) return;
            db.collection("watchlist").doc("myList").get().then(doc => {
                const data = doc.data();
                data[cat].push(val);
                db.collection("watchlist").doc("myList").update(data);
            });
        }

        function deleteItem(cat, idx) {
            db.collection("watchlist").doc("myList").get().then(doc => {
                const data = doc.data();
                data[cat].splice(idx, 1);
                db.collection("watchlist").doc("myList").update(data);
            });
        }
    </script>
</body>
</html>
