<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>WatchList Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0d0a15; --card: #1a1525; --accent: #00e676; }
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; }
        .container { max-width: 600px; margin: 0 auto; }
        .panel { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        h1 { text-align: center; color: var(--accent); }
        .category-block { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .progress-bar { height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
        .item { padding: 10px; border-bottom: 1px solid #333; margin-bottom: 5px; }
        .btn-group { display: flex; gap: 5px; margin-top: 5px; flex-wrap: wrap; }
        button { cursor: pointer; border: none; padding: 5px 8px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .add-btn { background: var(--accent); width: 100%; margin-top: 5px; padding: 10px; }
        input[type="text"] { width: 100%; padding: 8px; border-radius: 4px; border: none; box-sizing: border-box; background: #2a2535; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WATCHLIST</h1>
        <div class="panel">
            <input type="text" id="search" placeholder="🔍 Поиск по названию..." oninput="renderApp()">
        </div>
        <div class="panel">
            <input type="text" id="newCatName" placeholder="Новая категория...">
            <button class="add-btn" onclick="addCategory()">Создать категорию</button>
        </div>
        <div id="app">Загрузка...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTtkGKIVzdK9rk-9HqXBa9hYdzH-n7Dh0",
            authDomain: "watchlist-5c90e.firebaseapp.com",
            projectId: "watchlist-5c90e",
            storageBucket: "watchlist-5c90e.firebasestorage.app",
            messagingSenderId: "410347694098",
            appId: "1:410347694098:web:3539875f65d638a5f790cb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let cachedData = null;

        db.collection("watchlist").doc("myList").onSnapshot(doc => {
            if(doc.exists) { cachedData = doc.data(); renderApp(); }
        });

        function renderApp() {
            const app = document.getElementById('app');
            const query = document.getElementById('search').value.toLowerCase();
            app.innerHTML = '';
            
            Object.keys(cachedData).forEach(cat => {
                if(cat === 'settings') return;
                const list = cachedData[cat] || [];
                
                // Фильтрация для поиска
                const filteredList = list.filter(i => {
                    const name = (typeof i === 'string') ? i : i.name;
                    return name.toLowerCase().includes(query);
                });

                const watchedCount = list.filter(i => (typeof i !== 'string' && i.watched)).length;
                const percent = list.length ? (watchedCount / list.length) * 100 : 0;
                
                const section = document.createElement('div');
                section.className = 'category-block';
                section.innerHTML = `<h2>${cat}</h2>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${percent}%"></div></div>
                    <div>${filteredList.map((item, idx) => {
                        // Исправление "undefined": преобразуем старые строки в объекты
                        const obj = (typeof item === 'string') ? { name: item, watched: false, rating: 0, note: '' } : item;
                        return `
                        <div class="item">
                            <input type="checkbox" ${obj.watched ? 'checked' : ''} onchange="toggleWatched('${cat}', ${list.indexOf(item)})">
                            <strong>${obj.name}</strong> (${obj.rating || 0}★)<br>
                            <small>${obj.note || ''}</small>
                            <div class="btn-group">
                                <button onclick="editName('${cat}', ${list.indexOf(item)}, '${obj.name.replace(/'/g, "\\'")}')">Изменить</button>
                                <button onclick="setRating('${cat}', ${list.indexOf(item)})">Оценка</button>
                                <button onclick="editNote('${cat}', ${list.indexOf(item)})">Заметка</button>
                                <button style="background:#ff5252; color:white" onclick="deleteItem('${cat}', ${list.indexOf(item)})">Удалить</button>
                            </div>
                        </div>`;
                    }).join('')}</div>
                    <input type="text" id="input-${cat}" placeholder="Добавить...">
                    <button class="add-btn" onclick="addItem('${cat}')">Добавить</button>`;
                app.appendChild(section);
            });
        }

        function addCategory() {
            const name = document.getElementById('newCatName').value;
            if(name) db.collection("watchlist").doc("myList").update({ [name]: [] });
        }

        function addItem(cat) {
            const val = document.getElementById(`input-${cat}`).value;
            if(!val) return;
            db.collection("watchlist").doc("myList").update({ [cat]: firebase.firestore.FieldValue.arrayUnion({ name: val, watched: false, rating: 0, note: '' }) });
        }

        function editName(cat, idx, oldVal) {
            const newVal = prompt("Новое название:", oldVal);
            if(newVal) {
                const list = [...cachedData[cat]];
                list[idx].name = newVal;
                db.collection("watchlist").doc("myList").update({ [cat]: list });
            }
        }

        function toggleWatched(cat, idx) {
            const list = [...cachedData[cat]];
            list[idx].watched = !list[idx].watched;
            db.collection("watchlist").doc("myList").update({ [cat]: list });
        }

        function setRating(cat, idx) {
            const r = prompt("Оценка (1-5):", cachedData[cat][idx].rating || 0);
            if(r !== null) {
                const list = [...cachedData[cat]];
                list[idx].rating = parseInt(r);
                db.collection("watchlist").doc("myList").update({ [cat]: list });
            }
        }

        function editNote(cat, idx) {
            const n = prompt("Заметка:", cachedData[cat][idx].note || "");
            if(n !== null) {
                const list = [...cachedData[cat]];
                list[idx].note = n;
                db.collection("watchlist").doc("myList").update({ [cat]: list });
            }
        }

        function deleteItem(cat, idx) {
            const list = [...cachedData[cat]];
            list.splice(idx, 1);
            db.collection("watchlist").doc("myList").update({ [cat]: list });
        }
    </script>
</body>
</html>
