<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой WatchList</title>
    <style>
        :root { --bg-color: #0d0a15; --card-bg: rgba(30, 20, 45, 0.7); --emerald: #00e676; --purple: #9d4edd; }
        body { margin: 0; padding: 20px; font-family: sans-serif; background: linear-gradient(135deg, #1a0b2e, #000); color: #fff; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; }
        .category-block { background: var(--card-bg); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { color: var(--emerald); border-left: 4px solid var(--purple); padding-left: 10px; margin-top: 0;}
        .item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 5px; }
        .item-text { cursor: pointer; flex-grow: 1; }
        .actions { display: flex; gap: 5px; }
        button { background: transparent; border: 1px solid var(--emerald); color: var(--emerald); padding: 5px 8px; border-radius: 5px; cursor: pointer; font-size: 12px; }
        button.delete { border-color: #ff5252; color: #ff5252; }
        button:hover { background: var(--emerald); color: #000; }
        button.delete:hover { background: #ff5252; color: #fff; }
        input { flex-grow: 1; padding: 5px; border-radius: 5px; border: none; background: rgba(255,255,255,0.1); color: #fff; }
        .input-group { display: flex; gap: 5px; margin-top: 15px; }
        .add-btn { background: var(--emerald); border: none; color: #000; font-weight: bold; padding: 5px 15px; }
    </style>
</head>
<body>
    <div class="container" id="app"></div>

    <script>
        const initialData = {
            "Фильмы": [
                "Z – значит Захария (2015)", "Назад в будущее 3", "Трасса 60", "Час пик 1/2/3/4", "Полтора шпиона", 
                "Живая сталь", "Kingsman: Секретная служба (2015)", "Kingsman: Золотое кольцо (2017)", 
                "King’s Man: Начало (2021)", "Иллюзия обмана 2 (2016)", "Иллюзия обмана 3 (2025)", "Брюс Всемогущий", 
                "Лего. Фильм(просмотрено)", "Интерстеллар", "Рио (1/2)(пересмотреть)", "Добро пожаловать в Zомбилэнд (2009)", 
                "Zомбилэнд: Контрольный выстрел (2019)", "Искусство самообороны", "Меню", "Всё могу (2015)", 
                "Изобретение лжи (2009)", "Всегда говори «ДА» (2008)", "Лжец, лжец (1997)", "Мост в Терабитию(2007)", 
                "Идеальные дни", "Семь", "Драйв", "Отрыв", "Бесславные ублюдки", "Быстрее пули", "Малыш на драйве", 
                "Несносные боссы", "Остров проклятых", "Волк с уолк-стрит", "Разрушение", "Одержимость", "Бетмен(2022)", 
                "Spawn", "Миллион способов умереть на диком западе"
            ],
            "Аниме": [
                "Предсмертный список зомби", "Кулинарные поединки Сомы(досмотреть)", "Токийский Гуль: Перерождение(досмотреть)", 
                "Бездомный бог", "Иная", "Гачиакута", "Дневник будущего", "Пожарная бригада", "(Смотреть после пожарной бригады) Soul eater", 
                "5 сантиметров в секунду", "Хочу съесть твою поджелудочную", "Евангелион", "Форма голоса", "Тонель в лето", 
                "Тетрадь смерти", "Рагна богровый", "Резеро жизнь с нуля", "Магическая битва", "Моб психо сто", 
                "Ванпанчмен (1,2 сезон, 3 залупа)", "Адский рай(досмотреть 2 сезон)", "Человек бензопила", "Коносуба", "Ковбой бибоп", 
                "Завтрашний Джо", "Черный клевер", "Go Go Loser ranger", "Врата энштейна", "Кровавый парень", 
                "Школьный учитель Онидзука!", "Восхождение в тени", "Darker than Black", 
                "Плод Грисаи (2014, 13 эп. + спэшлы)", "Лабиринт Грисаи (2015, фильм/спэшл)", "Рай Грисаи (2015, 10 эп. + спэшлы)", 
                "Шарлотта", "Паразит", "Темнее черного", "Certain magical index", "Би: Начало", "Нет игры, нет жизни", 
                "Одинокий рокер", "Код гиас", "Самурай чамплу"
            ],
            "Сериалы": [
                "Пацаны(просмотрено)", "Флеш(досмотреть)", "Бесстыжие", "Уэйн", "Орвилл (сериал 2017 – 2022)"
            ]
        };

        function loadData() {
            const saved = localStorage.getItem('myWatchlist');
            return saved ? JSON.parse(saved) : initialData;
        }

        function saveData(data) {
            localStorage.setItem('myWatchlist', JSON.stringify(data));
            render();
        }

        function addItem(category) {
            const input = document.getElementById(`input-${category}`);
            if (input.value.trim() === "") return;
            const data = loadData();
            data[category].push(input.value);
            saveData(data);
        }

        function deleteItem(category, index) {
            const data = loadData();
            data[category].splice(index, 1);
            saveData(data);
        }

        function editItem(category, index) {
            const itemElement = document.getElementById(`item-${category}-${index}`);
            const currentText = itemElement.querySelector('.item-text').innerText;
            
            itemElement.innerHTML = `
                <input type="text" id="edit-${category}-${index}" value="${currentText}">
                <button onclick="saveEdit('${category}', ${index})">Сохранить</button>
            `;
        }

        function saveEdit(category, index) {
            const newValue = document.getElementById(`edit-${category}-${index}`).value;
            const data = loadData();
            data[category][index] = newValue;
            saveData(data);
        }

        function render() {
            const app = document.getElementById('app');
            const data = loadData();
            app.innerHTML = '<h1>WatchList</h1>';
            
            Object.keys(data).forEach(cat => {
                const section = document.createElement('div');
                section.className = 'category-block';
                section.innerHTML = `<h2>${cat}</h2>`;
                
                data[cat].forEach((item, index) => {
                    const div = document.createElement('div');
                    div.className = 'item';
                    div.id = `item-${cat}-${index}`;
                    div.innerHTML = `
                        <span class="item-text">${item}</span>
                        <div class="actions">
                            <button onclick="editItem('${cat}', ${index})">Изменить</button>
                            <button class="delete" onclick="deleteItem('${cat}', ${index})">Удалить</button>
                        </div>
                    `;
                    section.appendChild(div);
                });

                section.innerHTML += `
                    <div class="input-group">
                        <input type="text" id="input-${cat}" placeholder="Добавить новое...">
                        <button class="add-btn" onclick="addItem('${cat}')">+</button>
                    </div>
                `;
                app.appendChild(section);
            });
        }

        render();
    </script>
</body>
</html>
