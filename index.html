<!DOCTYPE html>
 <html lang="ru">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchList для двоих</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { 
            --bg1: #0d0a15; 
            --bg2: #1a1525; 
            --accent: #ff6b9d; 
            --edit: #448aff; 
            --del: #ff5252; 
        }
        body { 
            margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; 
            min-height: 100vh;
            background: linear-gradient(var(--deg, 135deg), var(--bg1), var(--bg2)); 
            color: #fff; transition: background 0.5s;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .stats-panel, .settings-panel, .search-panel { 
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; 
            margin-bottom: 20px; 
        }
        .settings-panel, .search-panel { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        input[type="color"], input[type="number"], select { border: none; width: 50px; height: 40px; cursor: pointer; }
        input[type="text"], select { padding: 10px; border-radius: 6px; border: none; background: #2a2535; color: white; }
        h1 { text-align: center; color: var(--accent); }
        .category-block { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px; backdrop-filter: blur(5px); }
        h2 { border-bottom: 2px solid var(--accent); padding-bottom: 5px; color: var(--accent); margin: 0 0 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .avg-badge { font-size: 13px; font-weight: normal; background: rgba(0,0,0,0.3); padding: 3px 10px; border-radius: 20px; color: #ffd700; border: 1px solid #444; }
        .item { padding: 12px 0; border-bottom: 1px solid #333; }
        .item-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .item-info { display: flex; align-items: center; gap: 10px; flex-grow: 1; }
        .watched { text-decoration: line-through; opacity: 0.6; }
        button { cursor: pointer; padding: 6px 12px; border-radius: 4px; border: none; font-weight: bold; }
        .edit-btn { background: var(--edit); color: white; }
        .del-btn { background: var(--del); color: white; }
        .add-btn { background: var(--accent); color: #fff; width: 100%; margin-top: 8px; padding: 10px; }
        .rating-box { display: flex; gap: 6px; cursor: pointer; }
        .rating-badge { padding: 2px 8px; border-radius: 10px; font-size: 12px; border: 1px solid #444; background: #2a2535; }
        .rating-badge.p1 { color: #81c784; }
        .rating-badge.p2 { color: #ff80ab; }
        .comment-text { font-size: 12px; color: #aaa; font-style: italic; margin: 6px 0 0 28px; }
        .stat-row { display: flex; justify-content: space-between; margin: 6px 0; }
        .stat-label { color: #bbb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WATCHLIST ЮРОЧКИ И ЛЮБИМОЙ КСЮ ❤️</h1>
        
        <div class="stats-panel" id="statsPanel">
            <h2 style="margin-top:0; color:#00ff9d;">📊 Статистика</h2>
            <div id="statsContent">Загрузка статистики...</div>
        </div>

        <div class="settings-panel">
            Цвет 1: <input type="color" id="bg1Picker" onchange="updateColors()">
            Цвет 2: <input type="color" id="bg2Picker" onchange="updateColors()">
            Градус: <input type="number" id="degInput" min="0" max="360" value="135" onchange="updateColors()">
            Акцент: <input type="color" id="accentPicker" onchange="updateColors()">
            <br><br>
            Сортировка: 
            <select id="sortSelect" onchange="renderApp()">
                <option value="default">По порядку</option>
                <option value="avg-desc">По среднему ↓</option>
                <option value="p1-desc">Юрочка ↓</option>
                <option value="p2-desc">Ксю ↓</option>
            </select>
        </div>

        <div class="search-panel">
            <input type="text" id="search" placeholder="🔍 Поиск..." oninput="debouncedRender()">
        </div>
        <div id="app">Загрузка...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTtkGKIVzdK9rk-9HqXBa9hYdzH-n7Dh0",
            authDomain: "watchlist-5c90e.firebaseapp.com",
            projectId: "watchlist-5c90e",
            storageBucket: "watchlist-5c90e.firebasestorage.app",
            messagingSenderId: "410347694098",
            appId: "1:410347694098:web:3539875f65d638a5f790cb"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let cachedData = null;
        let debounceTimer = null;

        const docRef = db.collection("watchlist").doc("myList");

        docRef.onSnapshot(doc => {
            if (doc.exists) {
                cachedData = doc.data();
                renderApp();
                updateStats();
            }
        });

        function toObj(item) {
            if (typeof item === 'string') return { name: item, watched: false, p1: null, p2: null, comment: "" };
            return {
                name: item.name,
                watched: item.watched ?? false,
                p1: item.p1 != null ? Number(item.p1) : null,
                p2: item.p2 != null ? Number(item.p2) : null,
                comment: item.comment ?? ""
            };
        }

        function getCategoryAvg(list) {
            let sum = 0, count = 0;
            for (const i of list) {
                if (typeof i.p1 === 'number' && !isNaN(i.p1)) { sum += i.p1; count++; }
                if (typeof i.p2 === 'number' && !isNaN(i.p2)) { sum += i.p2; count++; }
            }
            return count > 0 ? (sum / count).toFixed(1) : null;
        }

        function updateStats() {
            if (!cachedData) return;

            let total = 0, watched = 0, withComment = 0, sumAll = 0, countAll = 0;
            let html = '';

            const categories = ["Фильмы", "Аниме", "Сериалы"];

            categories.forEach(cat => {
                const list = (cachedData[cat] || []).map(toObj);
                const catTotal = list.length;
                const catWatched = list.filter(i => i.watched).length;
                const catComments = list.filter(i => i.comment && i.comment.trim()).length;

                let catSum = 0, catCount = 0;
                list.forEach(i => {
                    if (i.p1 != null && !isNaN(i.p1)) { catSum += i.p1; catCount++; }
                    if (i.p2 != null && !isNaN(i.p2)) { catSum += i.p2; catCount++; }
                });

                total += catTotal;
                watched += catWatched;
                withComment += catComments;
                sumAll += catSum;
                countAll += catCount;

                html += `<div class="stat-row"><span><strong>${cat}:</strong></span> <span>${catWatched}/${catTotal} просмотрено • ${catComments} с комментариями</span></div>`;
            });

            const globalAvg = countAll > 0 ? (sumAll / countAll).toFixed(1) : '—';

            document.getElementById('statsContent').innerHTML = `
                <div class="stat-row"><strong>Всего тайтлов:</strong> <span>${total}</span></div>
                <div class="stat-row"><strong>Просмотрено:</strong> <span>${watched} (${total ? Math.round(watched/total*100) : 0}%)</span></div>
                <div class="stat-row"><strong>Общий средний балл:</strong> <span>${globalAvg}</span></div>
                <div class="stat-row"><strong>С комментариями:</strong> <span>${withComment}</span></div>
                <hr style="border-color:#444; margin:10px 0;">
                ${html}
            `;
        }

        function debouncedRender() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(() => { renderApp(); updateStats(); }, 280);
        }

        function renderApp() {
            if (!cachedData) return;
            const query = document.getElementById('search').value.toLowerCase().trim();
            const sortType = document.getElementById('sortSelect').value;
            const app = document.getElementById('app');
            app.innerHTML = '';

            const cfg = cachedData.settings || {};
            applyColors(cfg.bg1, cfg.bg2, cfg.deg, cfg.accent);

            ["Фильмы", "Аниме", "Сериалы"].forEach(cat => {
                const rawList = cachedData[cat] || [];
                const list = rawList.map(toObj);

                const seen = new Set();
                let uniqueList = [];
                for (const item of list) {
                    const key = item.name.toLowerCase();
                    if (!seen.has(key)) {
                        seen.add(key);
                        if (item.name.toLowerCase().includes(query)) uniqueList.push(item);
                    }
                }

                if (sortType !== 'default') {
                    uniqueList.sort((a, b) => getSortValue(b, sortType) - getSortValue(a, sortType));
                }

                const avg = getCategoryAvg(uniqueList);
                const section = document.createElement('div');
                section.className = 'category-block';

                let html = `<h2>${cat} ${avg ? `<span class="avg-badge">Общий балл: ${avg}</span>` : ''}</h2>`;

                for (const obj of uniqueList) {
                    const escapedName = obj.name.replace(/'/g, "\\'");
                    html += `
                        <div class="item">
                            <div class="item-row">
                                <div class="item-info">
                                    <input type="checkbox" ${obj.watched ? 'checked' : ''} onchange="toggleWatched('${cat}', '${escapedName}')">
                                    <span class="${obj.watched ? 'watched' : ''}">${obj.name}</span>
                                </div>
                                <div class="rating-box" onclick="editRating('${cat}', '${escapedName}')">
                                    <span class="rating-badge p1">Юрочка: ${obj.p1 ?? '-'}</span>
                                    <span class="rating-badge p2">❤️ Ксю: ${obj.p2 ?? '-'}</span>
                                </div>
                                <div class="btn-group">
                                    <button class="edit-btn" onclick="editItem('${cat}', '${escapedName}')">✎</button>
                                    <button class="del-btn" onclick="deleteItem('${cat}', '${escapedName}')">✕</button>
                                </div>
                            </div>
                            ${obj.comment ? `<div class="comment-text">💬 ${obj.comment}</div>` : ''}
                        </div>`;
                }

                html += `<input type="text" id="input-${cat}" placeholder="Добавить новое..."><button class="add-btn" onclick="addItem('${cat}')">Добавить</button>`;
                section.innerHTML = html;
                app.appendChild(section);
            });
        }

        function getSortValue(item, sortType) {
            if (sortType === 'avg-desc') {
                let sum = 0, count = 0;
                if (item.p1 != null) { sum += item.p1; count++; }
                if (item.p2 != null) { sum += item.p2; count++; }
                return count > 0 ? sum / count : -1;
            }
            if (sortType === 'p1-desc') return item.p1 != null ? item.p1 : -1;
            if (sortType === 'p2-desc') return item.p2 != null ? item.p2 : -1;
            return 0;
        }

        function applyColors(bg1 = '#0d0a15', bg2 = '#1a1525', deg = 135, accent = '#ff6b9d') {
            document.documentElement.style.setProperty('--bg1', bg1);
            document.documentElement.style.setProperty('--bg2', bg2);
            document.documentElement.style.setProperty('--deg', deg + 'deg');
            document.documentElement.style.setProperty('--accent', accent);

            document.getElementById('bg1Picker').value = bg1;
            document.getElementById('bg2Picker').value = bg2;
            document.getElementById('degInput').value = deg;
            document.getElementById('accentPicker').value = accent;
        }

        function updateColors() {
            docRef.update({
                settings: {
                    bg1: document.getElementById('bg1Picker').value,
                    bg2: document.getElementById('bg2Picker').value,
                    deg: parseInt(document.getElementById('degInput').value) || 135,
                    accent: document.getElementById('accentPicker').value
                }
            });
        }

        function addItem(cat) {
            const input = document.getElementById(`input-${cat}`);
            const val = input.value.trim();
            if (!val) return;
            if ((cachedData[cat] || []).some(i => toObj(i).name.toLowerCase() === val.toLowerCase())) {
                alert("Это уже есть в списке!");
                return;
            }
            docRef.update({ [cat]: firebase.firestore.FieldValue.arrayUnion({ name: val, watched: false, p1: null, p2: null, comment: "" }) });
            input.value = '';
        }

        function toggleWatched(cat, name) {
            const list = (cachedData[cat] || []).map(toObj);
            const item = list.find(i => i.name === name);
            if (item) {
                item.watched = !item.watched;
                docRef.update({ [cat]: list });
            }
        }

        function editRating(cat, name) {
            const list = (cachedData[cat] || []).map(toObj);
            const item = list.find(i => i.name === name);
            if (!item) return;
            const p1 = prompt("Оценка Юрочки (0-10):", item.p1 || "");
            if (p1 === null) return;
            const p2 = prompt("Оценка любимой Ксю (0-10):", item.p2 || "");
            if (p2 === null) return;
            const comment = prompt("Комментарий:", item.comment || "");
            if (comment === null) return;

            item.p1 = p1.trim() ? parseFloat(p1.replace(',', '.')) : null;
            item.p2 = p2.trim() ? parseFloat(p2.replace(',', '.')) : null;
            item.comment = comment.trim();
            docRef.update({ [cat]: list });
        }

        function deleteItem(cat, name) {
            const list = (cachedData[cat] || []).map(toObj).filter(i => i.name !== name);
            docRef.update({ [cat]: list });
        }

        function editItem(cat, oldName) {
            const newVal = prompt("Изменить название:", oldName);
            if (!newVal || newVal === oldName) return;
            const list = (cachedData[cat] || []).map(toObj);
            const item = list.find(i => i.name === oldName);
            if (item) {
                item.name = newVal;
                docRef.update({ [cat]: list });
            }
        }
    </script>
</body>
</html>
