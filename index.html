<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchList Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0d0a15; --card: #1a1525; --accent: #00e676; --edit: #448aff; --del: #ff5252; }
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: #fff; transition: background 0.3s; background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh; }
        .container { max-width: 600px; margin: 0 auto; }
        .settings-panel, .search-panel { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; justify-content: center; flex-wrap: wrap; }
        input[type="text"], input[type="file"] { padding: 8px; border-radius: 6px; border: none; background: #2a2535; color: white; }
        input[type="color"] { border: none; width: 40px; height: 40px; cursor: pointer; background: none; }
        h1 { text-align: center; color: var(--accent); }
        .category-block { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        h2 { border-bottom: 2px solid var(--accent); padding-bottom: 5px; color: var(--accent); margin: 0 0 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .avg-badge { font-size: 13px; font-weight: normal; background: #2a2535; padding: 3px 10px; border-radius: 20px; color: #ffd700; border: 1px solid #3a3a4a; }
        .item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; gap: 8px; flex-wrap: wrap; }
        .item-info { display: flex; flex-direction: column; gap: 4px; flex-grow: 1; min-width: 0; }
        .item-row { display: flex; align-items: center; gap: 10px; }
        .comment-text { font-size: 11px; color: #aaa; font-style: italic; margin-left: 25px; }
        .watched { text-decoration: line-through; opacity: 0.6; }
        .btn-group { display: flex; gap: 5px; }
        button { cursor: pointer; padding: 5px 10px; border-radius: 4px; border: none; font-weight: bold; }
        .edit-btn { background: var(--edit); color: white; }
        .del-btn { background: var(--del); color: white; }
        .add-btn { background: var(--accent); color: #000; width: 100%; margin-top: 5px; font-weight: bold; }
        .rating-badge { cursor: pointer; padding: 3px 9px; border-radius: 20px; font-size: 12px; border: 1px solid #3a3a4a; background: #2a2535; user-select: none; }
        .rating-badge.rated { color: #ffd700; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WATCHLIST WITH MY GF</h1>
        <div class="settings-panel">
            <input type="text" id="bgInput" placeholder="Ссылка на фон" onchange="updateBg()">
            <input type="file" id="bgFile" accept="image/*" onchange="handleFileUpload(this)">
            <input type="color" id="accentPicker" onchange="updateColors()">
        </div>
        <div class="search-panel">
            <input type="text" id="search" placeholder="🔍 Поиск..." oninput="renderApp()">
        </div>
        <div id="app">Загрузка данных...</div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBTtkGKIVzdK9rk-9HqXBa9hYdzH-n7Dh0", authDomain: "watchlist-5c90e.firebaseapp.com", projectId: "watchlist-5c90e", storageBucket: "watchlist-5c90e.firebasestorage.app", messagingSenderId: "410347694098", appId: "1:410347694098:web:3539875f65d638a5f790cb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let cachedData = null;

        db.collection("watchlist").doc("myList").onSnapshot(doc => {
            if (doc.exists) { cachedData = doc.data(); renderApp(); }
        });

        function toObj(item) {
            return typeof item === 'string' ? { name: item, watched: false, rating: null } : item;
        }

        function getAvg(list) {
            const items = list.map(toObj).filter(o => o.rating && (o.rating.me > 0 || o.rating.gf > 0));
            if (!items.length) return null;
            const sum = items.reduce((s, o) => s + ((o.rating.me || 0) + (o.rating.gf || 0)) / ((o.rating.me > 0 && o.rating.gf > 0) ? 2 : 1), 0);
            return (sum / items.length).toFixed(1);
        }

        function renderApp() {
            if (!cachedData) return;
            const query = document.getElementById('search').value.toLowerCase();
            const app = document.getElementById('app');
            app.innerHTML = '';
            
            const bg = cachedData.settings?.bg || '#0d0a15';
            const accent = cachedData.settings?.accent || '#00e676';
            document.body.style.background = bg.startsWith('url') ? bg : bg;
            document.documentElement.style.setProperty('--accent', accent);
            document.getElementById('accentPicker').value = accent;
            document.getElementById('bgInput').value = bg.startsWith('url') ? '' : bg;

            ["Фильмы", "Аниме", "Сериалы"].forEach(cat => {
                const list = cachedData[cat] || [];
                const avg = getAvg(list);
                const section = document.createElement('div');
                section.className = 'category-block';
                section.innerHTML = `<h2>${cat} ${avg ? `<span class="avg-badge">⭐ ${avg}/10</span>` : ''}</h2>` +
                    list.map((item, idx) => {
                        const obj = toObj(item);
                        if (!obj.name.toLowerCase().includes(query)) return '';
                        return `
                        <div class="item">
                            <div class="item-info">
                                <div class="item-row">
                                    <input type="checkbox" ${obj.watched ? 'checked' : ''} onchange="toggleWatched('${cat}', ${idx})">
                                    <span class="${obj.watched ? 'watched' : ''}">${idx + 1}. ${obj.name}</span>
                                </div>
                                ${obj.rating?.comment ? `<span class="comment-text">💬 ${obj.rating.comment}</span>` : ''}
                            </div>
                            <span class="rating-badge ${obj.rating ? 'rated' : ''}" onclick="rateItem('${cat}', ${idx})">
                                ${obj.rating ? `Я:${obj.rating.me || 0} | Она:${obj.rating.gf || 0}` : '☆ Оценить'}
                            </span>
                            <div class="btn-group">
                                <button class="edit-btn" onclick="editItem('${cat}', ${idx}, '${obj.name.replace(/'/g, "\\'")}')">✎</button>
                                <button class="del-btn" onclick="deleteItem('${cat}', ${idx})">✕</button>
                            </div>
                        </div>`;
                    }).join('') + `<input type="text" id="in-${cat}" placeholder="Добавить..."><button class="add-btn" onclick="addItem('${cat}')">Добавить</button>`;
                app.appendChild(section);
            });
        }

        function handleFileUpload(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 800; canvas.height = 800 * (img.height / img.width);
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    db.collection("watchlist").doc("myList").update({ "settings.bg": `url('${canvas.toDataURL('image/jpeg', 0.6)}')` });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function rateItem(cat, idx) {
            const obj = toObj(cachedData[cat][idx]);
            const r = obj.rating || { me: 0, gf: 0, comment: '' };
            const me = prompt("Ваша оценка:", r.me);
            if (me === null) return;
            const gf = prompt("Оценка девушки:", r.gf);
            const comm = prompt("Комментарий:", r.comment);
            obj.rating = { me: parseFloat(me) || 0, gf: parseFloat(gf) || 0, comment: comm || '' };
            const list = cachedData[cat].map(toObj);
            list[idx] = obj;
            db.collection("watchlist").doc("myList").update({ [cat]: list });
        }

        function updateBg() { db.collection("watchlist").doc("myList").update({ "settings.bg": document.getElementById('bgInput').value }); }
        function updateColors() { db.collection("watchlist").doc("myList").update({ "settings.accent": document.getElementById('accentPicker').value }); }
        function toggleWatched(cat, idx) { const list = cachedData[cat].map(toObj); list[idx].watched = !list[idx].watched; db.collection("watchlist").doc("myList").update({ [cat]: list }); }
        function addItem(cat) { const val = document.getElementById(`in-${cat}`).value.trim(); if (val) db.collection("watchlist").doc("myList").update({ [cat]: firebase.firestore.FieldValue.arrayUnion({ name: val, watched: false, rating: null }) }); }
        function deleteItem(cat, idx) { const list = cachedData[cat].map(toObj); list.splice(idx, 1); db.collection("watchlist").doc("myList").update({ [cat]: list }); }
        function editItem(cat, idx, oldVal) { const newVal = prompt("Название:", oldVal); if (newVal) { const list = cachedData[cat].map(toObj); list[idx].name = newVal; db.collection("watchlist").doc("myList").update({ [cat]: list }); } }
    </script>
</body>
</html>
