<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой WatchList</title>
    <style>
        :root {
            --bg-color: #0d0a15;
            --emerald: #00e676;
            --purple: #9d4edd;
            --card-bg: rgba(30, 20, 45, 0.7);
        }

        body { 
            margin: 0; padding: 20px; font-family: sans-serif; 
            background: var(--bg-color); color: #fff; 
            display: flex; flex-direction: column; align-items: center;
            transition: background 0.3s;
        }

        .container { max-width: 600px; width: 100%; }

        /* Неоновый заголовок */
        h1 { 
            text-align: center; color: #fff; font-size: 3rem; margin: 20px 0;
            text-transform: uppercase; letter-spacing: 5px;
            text-shadow: 0 0 10px #fff, 0 0 20px #fff, 0 0 30px var(--emerald), 0 0 40px var(--emerald);
        }

        /* Настройки */
        .settings-block { background: var(--card-bg); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--emerald); }
        .settings-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }

        /* Список с нумерацией */
        .category-block { 
            background: var(--card-bg); backdrop-filter: blur(10px); 
            padding: 20px; border-radius: 15px; margin-bottom: 25px; 
            border: 1px solid rgba(255,255,255,0.1);
            counter-reset: item; /* Запуск счетчика */
        }

        h2 { color: var(--emerald); border-left: 4px solid var(--purple); padding-left: 10px; }

        .item { 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 10px;
            counter-increment: item; /* Увеличение счетчика */
        }
        
        .item::before { content: counter(item) ". "; color: var(--emerald); font-weight: bold; }
        .item-text { cursor: pointer; flex-grow: 1; }

        /* Кнопки и цвета */
        button { background: transparent; border: 1px solid var(--emerald); color: var(--emerald); padding: 5px 8px; border-radius: 5px; cursor: pointer; }
        button.delete { border-color: #ff5252; color: #ff5252; }
        button:hover { background: var(--emerald); color: #000; }
        button.delete:hover { background: #ff5252; color: #fff; }

        input { padding: 5px; border-radius: 5px; border: none; background: rgba(255,255,255,0.1); color: #fff; }
        .add-btn { background: var(--emerald); border: none; color: #000; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WatchList</h1>
        
        <div class="settings-block">
            <h3>⚙️ Настройки</h3>
            <div class="settings-row">
                Фон: <input type="color" id="bgPicker" onchange="updateColors()">
                Кнопки: <input type="color" id="btnPicker" onchange="updateColors()">
            </div>
        </div>

        <div id="app"></div>
    </div>

    <script>
        const initialData = {
            "Фильмы": ["Z – значит Захария", "Назад в будущее 3", "Трасса 60", "Интерстеллар"],
            "Аниме": ["Тетрадь смерти", "Человек-бензопила", "Код гиас"],
            "Сериалы": ["Пацаны", "Флеш", "Бесстыжие"]
        };

        // Загрузка настроек
        function applyStoredSettings() {
            const savedBg = localStorage.getItem('bgColor') || '#0d0a15';
            const savedBtn = localStorage.getItem('btnColor') || '#00e676';
            
            document.documentElement.style.setProperty('--bg-color', savedBg);
            document.documentElement.style.setProperty('--emerald', savedBtn);
            
            document.getElementById('bgPicker').value = savedBg;
            document.getElementById('btnPicker').value = savedBtn;
        }

        function updateColors() {
            const bg = document.getElementById('bgPicker').value;
            const btn = document.getElementById('btnPicker').value;
            
            document.documentElement.style.setProperty('--bg-color', bg);
            document.documentElement.style.setProperty('--emerald', btn);
            
            localStorage.setItem('bgColor', bg);
            localStorage.setItem('btnColor', btn);
        }

        // Логика списка
        function loadData() { return JSON.parse(localStorage.getItem('myWatchlist')) || initialData; }
        function saveData(data) { localStorage.setItem('myWatchlist', JSON.stringify(data)); render(); }

        function addItem(cat) {
            const input = document.getElementById(`input-${cat}`);
            if (!input.value) return;
            const data = loadData();
            data[cat].push(input.value);
            saveData(data);
        }

        function deleteItem(cat, idx) {
            const data = loadData();
            data[cat].splice(idx, 1);
            saveData(data);
        }

        function editItem(cat, idx) {
            const text = document.getElementById(`item-${cat}-${idx}`).querySelector('.item-text').innerText;
            const newText = prompt("Редактировать:", text);
            if (newText !== null) {
                const data = loadData();
                data[cat][idx] = newText;
                saveData(data);
            }
        }

        function render() {
            const app = document.getElementById('app');
            const data = loadData();
            app.innerHTML = '';
            
            Object.keys(data).forEach(cat => {
                const section = document.createElement('div');
                section.className = 'category-block';
                section.innerHTML = `<h2>${cat}</h2>`;
                
                data[cat].forEach((item, idx) => {
                    section.innerHTML += `
                        <div class="item" id="item-${cat}-${idx}">
                            <span class="item-text">${item}</span>
                            <div>
                                <button onclick="editItem('${cat}', ${idx})">✏️</button>
                                <button class="delete" onclick="deleteItem('${cat}', ${idx})">🗑️</button>
                            </div>
                        </div>`;
                });
                
                section.innerHTML += `
                    <div style="margin-top:15px; display:flex; gap:5px;">
                        <input type="text" id="input-${cat}" placeholder="Добавить...">
                        <button class="add-btn" onclick="addItem('${cat}')">+</button>
                    </div>`;
                app.appendChild(section);
            });
        }

        // Инициализация
        applyStoredSettings();
        render();
    </script>
</body>
</html>
