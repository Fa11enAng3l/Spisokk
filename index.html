<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchList Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0d0a15; --card: #1a1525; --accent: #00e676; --edit: #448aff; --del: #ff5252; }
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; }
        .container { max-width: 600px; width: 100%; }
        h1 { text-align: center; font-size: 2rem; color: var(--accent); letter-spacing: 2px; }
        .category-block { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { border-bottom: 2px solid var(--accent); padding-bottom: 5px; font-size: 1.2rem; }
        .item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; }
        .btn-group { display: flex; gap: 5px; }
        button { cursor: pointer; padding: 5px 10px; border-radius: 4px; border: none; font-size: 0.8rem; font-weight: bold; }
        .edit-btn { background: var(--edit); color: white; }
        .del-btn { background: var(--del); color: white; }
        input { padding: 10px; width: calc(100% - 22px); border-radius: 6px; border: none; background: #2a2535; color: white; margin-top: 10px; }
        .add-btn { background: var(--accent); color: #000; width: 100%; margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WATCHLIST</h1>
        <div id="app">Загрузка данных...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTtkGKIVzdK9rk-9HqXBa9hYdzH-n7Dh0",
            authDomain: "watchlist-5c90e.firebaseapp.com",
            projectId: "watchlist-5c90e",
            storageBucket: "watchlist-5c90e.firebasestorage.app",
            messagingSenderId: "410347694098",
            appId: "1:410347694098:web:3539875f65d638a5f790cb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function render(data) {
            const app = document.getElementById('app');
            app.innerHTML = '';
            ["Фильмы", "Аниме", "Сериалы"].forEach(cat => {
                const list = data[cat] || [];
                const section = document.createElement('div');
                section.className = 'category-block';
                section.innerHTML = `<h2>${cat}</h2>` + 
                    list.map((item, idx) => `
                        <div class="item">
                            <span>${item}</span>
                            <div class="btn-group">
                                <button class="edit-btn" onclick="editItem('${cat}', ${idx}, '${item.replace(/'/g, "\\'")}')">Изменить</button>
                                <button class="del-btn" onclick="deleteItem('${cat}', ${idx})">Удалить</button>
                            </div>
                        </div>`).join('') +
                    `<input type="text" id="input-${cat}" placeholder="Добавить название...">
                     <button class="add-btn" onclick="addItem('${cat}')">Добавить</button>`;
                app.appendChild(section);
            });
        }

        db.collection("watchlist").doc("myList").onSnapshot(doc => { if(doc.exists) render(doc.data()); });

        function addItem(cat) {
            const val = document.getElementById(`input-${cat}`).value;
            if (!val) return;
            db.collection("watchlist").doc("myList").update({ [cat]: firebase.firestore.FieldValue.arrayUnion(val) });
        }

        function deleteItem(cat, idx) {
            db.collection("watchlist").doc("myList").get().then(doc => {
                const data = doc.data();
                data[cat].splice(idx, 1);
                db.collection("watchlist").doc("myList").update({ [cat]: data[cat] });
            });
        }

        function editItem(cat, idx, oldVal) {
            const newVal = prompt("Изменить название:", oldVal);
            if (!newVal) return;
            db.collection("watchlist").doc("myList").get().then(doc => {
                const data = doc.data();
                data[cat][idx] = newVal;
                db.collection("watchlist").doc("myList").update({ [cat]: data[cat] });
            });
        }
    </script>
</body>
</html>
