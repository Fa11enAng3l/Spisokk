<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>WatchList Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0d0a15; --card: #1a1525; --accent: #00e676; --edit: #448aff; --del: #ff5252; }
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; }
        .container { max-width: 600px; margin: 0 auto; }
        .search-box { width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: none; background: #2a2535; color: white; box-sizing: border-box; }
        .category-block { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .item { display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #333; gap: 10px; }
        .item-text { flex-grow: 1; transition: opacity 0.3s; }
        .watched { opacity: 0.5; text-decoration: line-through; }
        .btn-group { display: flex; gap: 5px; }
        button { cursor: pointer; padding: 4px 8px; border-radius: 4px; border: none; font-size: 12px; }
        .del-btn { background: var(--del); color: white; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WATCHLIST</h1>
        <input type="text" id="searchInput" class="search-box" placeholder="🔍 Поиск по названию..." oninput="render()">
        <div id="app">Загрузка...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "ВАШ_API_KEY",
            authDomain: "watchlist-5c90e.firebaseapp.com",
            projectId: "watchlist-5c90e",
            storageBucket: "watchlist-5c90e.firebasestorage.app",
            messagingSenderId: "410347694098",
            appId: "1:410347694098:web:3539875f65d638a5f790cb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentData = {};

        db.collection("watchlist").doc("myList").onSnapshot(doc => {
            currentData = doc.exists ? doc.data() : {};
            render();
        });

        function render() {
            const app = document.getElementById('app');
            const query = document.getElementById('searchInput').value.toLowerCase();
            app.innerHTML = '';
            
            ["Фильмы", "Аниме", "Сериалы"].forEach(cat => {
                const list = currentData[cat] || [];
                const filtered = list.filter(item => (item.name || item).toLowerCase().includes(query));
                
                const section = document.createElement('div');
                section.className = 'category-block';
                section.innerHTML = `<h2>${cat}</h2>` + 
                    filtered.map((item, idx) => {
                        const isObj = typeof item === 'object';
                        const name = isObj ? item.name : item;
                        const checked = isObj && item.watched ? 'checked' : '';
                        const realIdx = list.indexOf(item); // Ищем реальный индекс в исходном списке
                        
                        return `
                        <div class="item">
                            <input type="checkbox" ${checked} onchange="toggleWatched('${cat}', ${realIdx})">
                            <span class="item-text ${checked ? 'watched' : ''}">${name}</span>
                            <button class="del-btn" onclick="deleteItem('${cat}', ${realIdx})">X</button>
                        </div>`;
                    }).join('');
                app.appendChild(section);
            });
        }

        function toggleWatched(cat, idx) {
            db.collection("watchlist").doc("myList").get().then(doc => {
                const data = doc.data();
                let item = data[cat][idx];
                // Превращаем старые строки в объекты при первом клике
                if (typeof item === 'string') item = { name: item, watched: false };
                item.watched = !item.watched;
                data[cat][idx] = item;
                db.collection("watchlist").doc("myList").update({ [cat]: data[cat] });
            });
        }

        function deleteItem(cat, idx) {
            db.collection("watchlist").doc("myList").get().then(doc => {
                const data = doc.data();
                data[cat].splice(idx, 1);
                db.collection("watchlist").doc("myList").update({ [cat]: data[cat] });
            });
        }
    </script>
</body>
</html>
