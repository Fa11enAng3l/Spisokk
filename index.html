<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchList для двоих</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg1: #0d0a15; --bg2: #1a1525; --accent: #ff6b9d; --edit: #448aff; --del: #ff5252; }
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; min-height: 100vh;
               background: linear-gradient(135deg, var(--bg1), var(--bg2)); color: #fff; }
        .container { max-width: 600px; margin: 0 auto; }
        .settings-panel, .search-panel { background: rgba(0,0,0,0.3); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 10px; align-items: center; justify-content: center; }
        input[type="color"] { border: none; width: 40px; height: 40px; cursor: pointer; background: none; }
        input[type="text"] { padding: 10px; width: 100%; border-radius: 6px; border: none; background: #2a2535; color: white; }
        h1 { text-align: center; color: var(--accent); }
        .category-block { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 20px; backdrop-filter: blur(5px); }
        h2 { border-bottom: 2px solid var(--accent); padding-bottom: 5px; color: var(--accent); margin: 0 0 12px 0; display: flex; justify-content: space-between; align-items: center; }
        .avg-badge { font-size: 13px; font-weight: normal; background: rgba(0,0,0,0.3); padding: 3px 10px; border-radius: 20px; color: #ffd700; border: 1px solid #444; }
        .item { display: flex; flex-direction: column; padding: 10px 0; border-bottom: 1px solid #333; gap: 8px; }
        .item-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .item-info { display: flex; align-items: center; gap: 10px; flex-grow: 1; min-width: 0; }
        .watched { text-decoration: line-through; opacity: 0.6; }
        .btn-group { display: flex; gap: 5px; }
        button { cursor: pointer; padding: 5px 10px; border-radius: 4px; border: none; font-weight: bold; }
        .edit-btn { background: var(--edit); color: white; }
        .del-btn { background: var(--del); color: white; }
        .add-btn { background: var(--accent); color: #fff; width: 100%; margin-top: 5px; }
        .rating-box { display: flex; gap: 5px; cursor: pointer; }
        .rating-badge { padding: 2px 8px; border-radius: 10px; font-size: 12px; border: 1px solid #444; background: #2a2535; }
        .rating-badge.p1 { color: #81c784; }
        .rating-badge.p2 { color: #ff80ab; }
        .comment-text { font-size: 12px; color: #aaa; font-style: italic; margin-left: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WATCHLIST НА ДВОИХ</h1>
        <div class="settings-panel">
            Фон: <input type="color" id="bg1Picker" onchange="updateColors()">
            <input type="color" id="bg2Picker" onchange="updateColors()">
            Акцент: <input type="color" id="accentPicker" onchange="updateColors()">
        </div>
        <div class="search-panel">
            <input type="text" id="search" placeholder="🔍 Поиск..." oninput="renderApp()">
        </div>
        <div id="app">Загрузка...</div>
    </div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBTtkGKIVzdK9rk-9HqXBa9hYdzH-n7Dh0",
            authDomain: "watchlist-5c90e.firebaseapp.com",
            projectId: "watchlist-5c90e",
            storageBucket: "watchlist-5c90e.firebasestorage.app",
            messagingSenderId: "410347694098",
            appId: "1:410347694098:web:3539875f65d638a5f790cb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let cachedData = null;

        db.collection("watchlist").doc("myList").onSnapshot(doc => {
            if (doc.exists) { cachedData = doc.data(); renderApp(); }
        });

        function toObj(item) {
            if (typeof item === 'string') return { name: item, watched: false, p1: null, p2: null, comment: "" };
            return {
                name: item.name,
                watched: item.watched ?? false,
                p1: item.p1 ?? null,
                p2: item.p2 ?? null,
                comment: item.comment ?? ""
            };
        }

        // Надежный расчет среднего
        function getCategoryAvg(list) {
            let sum = 0;
            let count = 0;
            list.forEach(i => {
                const v1 = parseFloat(i.p1);
                const v2 = parseFloat(i.p2);
                if (!isNaN(v1)) { sum += v1; count++; }
                if (!isNaN(v2)) { sum += v2; count++; }
            });
            return count > 0 ? (sum / count).toFixed(1) : null;
        }

        function renderApp() {
            if (!cachedData) return;
            const query = document.getElementById('search').value.toLowerCase();
            const app = document.getElementById('app');
            app.innerHTML = '';
            
            const cfg = cachedData.settings || {};
            applyColors(cfg.bg1 || '#0d0a15', cfg.bg2 || '#1a1525', cfg.accent || '#ff6b9d');

            ["Фильмы", "Аниме", "Сериалы"].forEach(cat => {
                const rawList = cachedData[cat] || [];
                
                // Удаление дубликатов на лету
                const uniqueList = [];
                const seen = new Set();
                rawList.forEach(item => {
                    const obj = toObj(item);
                    if (!seen.has(obj.name.toLowerCase())) {
                        uniqueList.push(obj);
                        seen.add(obj.name.toLowerCase());
                    }
                });

                const avg = getCategoryAvg(uniqueList);
                
                const section = document.createElement('div');
                section.className = 'category-block';
                section.innerHTML = `<h2>${cat} ${avg ? `<span class="avg-badge">Общий балл: ${avg}</span>` : ''}</h2>` + 
                uniqueList.map((obj, idx) => {
                    if (!obj.name.toLowerCase().includes(query)) return '';
                    return `
                        <div class="item">
                            <div class="item-row">
                                <div class="item-info">
                                    <input type="checkbox" ${obj.watched ? 'checked' : ''} onchange="toggleWatched('${cat}', '${obj.name}')">
                                    <span class="${obj.watched ? 'watched' : ''}">${obj.name}</span>
                                </div>
                                <div class="rating-box" onclick="editRating('${cat}', '${obj.name}')">
                                    <span class="rating-badge p1" title="Твоя оценка">Я: ${obj.p1 ?? '-'}</span>
                                    <span class="rating-badge p2" title="Оценка ненаглядной">Она: ${obj.p2 ?? '-'}</span>
                                </div>
                                <div class="btn-group">
                                    <button class="edit-btn" onclick="editItem('${cat}', '${obj.name}')">✎</button>
                                    <button class="del-btn" onclick="deleteItem('${cat}', '${obj.name}')">✕</button>
                                </div>
                            </div>
                            ${obj.comment ? `<div class="comment-text">💬 ${obj.comment}</div>` : ''}
                        </div>`;
                }).join('') + `<input type="text" id="input-${cat}" placeholder="Добавить новое..."><button class="add-btn" onclick="addItem('${cat}')">Добавить</button>`;
                app.appendChild(section);
            });
        }

        // Функции работают теперь по имени (так надежнее при фильтрации дублей)
        function editRating(cat, name) {
            const list = cachedData[cat].map(toObj);
            const item = list.find(i => i.name === name);
            if(!item) return;

            const p1 = prompt("Твоя оценка (0-10):", item.p1 || "");
            if (p1 === null) return;
            const p2 = prompt("Оценка моей ненаглядной (0-10):", item.p2 || "");
            if (p2 === null) return;
            const comment = prompt("Комментарий:", item.comment || "");
            if (comment === null) return;

            item.p1 = p1.trim() ? parseFloat(p1.replace(',', '.')) : null;
            item.p2 = p2.trim() ? parseFloat(p2.replace(',', '.')) : null;
            item.comment = comment.trim();
            
            db.collection("watchlist").doc("myList").update({ [cat]: list });
        }

        function addItem(cat) {
            const input = document.getElementById(`input-${cat}`);
            const val = input.value.trim();
            if (!val) return;
            
            if (cachedData[cat].some(i => i.name.toLowerCase() === val.toLowerCase())) {
                alert("Это уже есть в списке!");
                return;
            }

            const newItem = { name: val, watched: false, p1: null, p2: null, comment: "" };
            db.collection("watchlist").doc("myList").update({
                [cat]: firebase.firestore.FieldValue.arrayUnion(newItem)
            });
            input.value = '';
        }

        function toggleWatched(cat, name) {
            const list = cachedData[cat].map(toObj);
            const item = list.find(i => i.name === name);
            if(item) {
                item.watched = !item.watched;
                db.collection("watchlist").doc("myList").update({ [cat]: list });
            }
        }

        function deleteItem(cat, name) {
            const list = cachedData[cat].map(toObj).filter(i => i.name !== name);
            db.collection("watchlist").doc("myList").update({ [cat]: list });
        }

        function editItem(cat, oldName) {
            const newVal = prompt("Изменить название:", oldName);
            if (!newVal) return;
            const list = cachedData[cat].map(toObj);
            const item = list.find(i => i.name === oldName);
            if(item) {
                item.name = newVal;
                db.collection("watchlist").doc("myList").update({ [cat]: list });
            }
        }

        function applyColors(bg1, bg2, accent) {
            document.documentElement.style.setProperty('--bg1', bg1);
            document.documentElement.style.setProperty('--bg2', bg2);
            document.documentElement.style.setProperty('--accent', accent);
            document.getElementById('bg1Picker').value = bg1;
            document.getElementById('bg2Picker').value = bg2;
            document.getElementById('accentPicker').value = accent;
        }

        function updateColors() {
            db.collection("watchlist").doc("myList").update({
                settings: {
                    bg1: document.getElementById('bg1Picker').value,
                    bg2: document.getElementById('bg2Picker').value,
                    accent: document.getElementById('accentPicker').value
                }
            });
        }
    </script>
</body>
</html>
