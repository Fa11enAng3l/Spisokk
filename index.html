<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchList Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0d0a15; --card: #1a1525; --accent: #00e676; --edit: #448aff; --del: #ff5252; }
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; background-attachment: fixed; transition: background 0.3s; }
        .container { max-width: 600px; margin: 0 auto; }
        .settings-panel { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        input[type="text"] { padding: 10px; border-radius: 6px; border: none; background: #2a2535; color: white; width: 100%; box-sizing: border-box; }
        h1 { text-align: center; color: var(--accent); }
        .category-block { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #333; gap: 10px; }
        .item-main { display: flex; align-items: center; gap: 10px; flex-grow: 1; min-width: 0; }
        .item-info { display: flex; flex-direction: column; overflow: hidden; }
        .comment-text { font-size: 11px; color: #aaa; font-style: italic; margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .watched { text-decoration: line-through; opacity: 0.6; }
        .rating-badge { cursor: pointer; padding: 4px 8px; border-radius: 6px; font-size: 11px; background: #2a2535; border: 1px solid #444; white-space: nowrap; }
        button { cursor: pointer; padding: 6px 12px; border-radius: 4px; border: none; font-weight: bold; }
        .add-btn { background: var(--accent); color: #000; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>
<div class="container">
    <h1>WATCHLIST WITH MY GF</h1>
    <div class="settings-panel">
        <input type="text" id="bgInput" placeholder="Цвет (#000) или URL фона">
        <button onclick="updateBg()" style="background: var(--edit); color: white;">Применить фон</button>
    </div>
    <div id="app">Загрузка данных...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBTtkGKIVzdK9rk-9HqXBa9hYdzH-n7Dh0",
        authDomain: "watchlist-5c90e.firebaseapp.com",
        projectId: "watchlist-5c90e",
        storageBucket: "watchlist-5c90e.firebasestorage.app",
        messagingSenderId: "410347694098",
        appId: "1:410347694098:web:3539875f65d638a5f790cb"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let cachedData = {};

    // Загрузка данных
    db.collection("watchlist").doc("myList").onSnapshot(doc => {
        if (doc.exists) {
            cachedData = doc.data();
            if (cachedData.settings?.bg) document.body.style.background = cachedData.settings.bg;
            renderApp();
        } else {
            document.getElementById('app').innerHTML = "База данных пуста";
        }
    });

    function toObj(item) {
        return typeof item === 'string' ? { name: item, watched: false, rating: null } : item;
    }

    function renderApp() {
        const app = document.getElementById('app');
        app.innerHTML = '';
        ["Фильмы", "Аниме", "Сериалы"].forEach(cat => {
            const list = (cachedData[cat] || []).map(toObj);
            const section = document.createElement('div');
            section.className = 'category-block';
            section.innerHTML = `<h2>${cat}</h2>` + list.map((obj, idx) => `
                <div class="item">
                    <div class="item-main">
                        <input type="checkbox" ${obj.watched ? 'checked' : ''} onchange="toggleWatched('${cat}', ${idx})">
                        <div class="item-info">
                            <span class="${obj.watched ? 'watched' : ''}">${obj.name}</span>
                            ${obj.rating?.comment ? `<span class="comment-text">"${obj.rating.comment}"</span>` : ''}
                        </div>
                    </div>
                    <div class="rating-badge" onclick="rateItem('${cat}', ${idx})">
                        ${obj.rating ? `Я:${obj.rating.me || 0} | Она:${obj.rating.gf || 0}` : '☆'}
                    </div>
                    <button onclick="deleteItem('${cat}', ${idx})" style="background:transparent; color:#ff5252">✕</button>
                </div>`).join('') + `<input type="text" id="in-${cat}" placeholder="Добавить..." style="margin-top:10px"><button class="add-btn" onclick="addItem('${cat}')">Добавить</button>`;
            app.appendChild(section);
        });
    }

    async function rateItem(cat, idx) {
        const item = toObj(cachedData[cat][idx]);
        const r = item.rating || { me: 0, gf: 0, comment: '' };
        const me = prompt("Ваша оценка (0-10):", r.me);
        if (me === null) return;
        const gf = prompt("Оценка девушки (0-10):", r.gf);
        if (gf === null) return;
        const comment = prompt("Комментарий:", r.comment);
        
        item.rating = { me: parseFloat(me) || 0, gf: parseFloat(gf) || 0, comment: comment || '' };
        const list = cachedData[cat].map(toObj);
        list[idx] = item;
        await db.collection("watchlist").doc("myList").update({ [cat]: list });
    }

    async function updateBg() {
        const val = document.getElementById('bgInput').value;
        await db.collection("watchlist").doc("myList").update({ "settings.bg": val });
    }

    async function toggleWatched(cat, idx) {
        const list = cachedData[cat].map(toObj);
        list[idx].watched = !list[idx].watched;
        await db.collection("watchlist").doc("myList").update({ [cat]: list });
    }

    async function addItem(cat) {
        const input = document.getElementById(`in-${cat}`);
        if (!input.value) return;
        await db.collection("watchlist").doc("myList").update({ 
            [cat]: firebase.firestore.FieldValue.arrayUnion({ name: input.value, watched: false, rating: null }) 
        });
        input.value = '';
    }

    async function deleteItem(cat, idx) {
        if (!confirm("Удалить элемент?")) return;
        const list = cachedData[cat].map(toObj);
        list.splice(idx, 1);
        await db.collection("watchlist").doc("myList").update({ [cat]: list });
    }
</script>
</body>
</html>
