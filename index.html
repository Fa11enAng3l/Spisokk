<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchList Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --bg: #0d0a15; --card: #1a1525; --accent: #00e676; --edit: #448aff; --del: #ff5252; }
        body { margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; transition: background 0.3s; }
        .container { max-width: 600px; margin: 0 auto; }
        
        .settings-panel { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; gap: 20px; align-items: center; justify-content: center; }
        .setting-item { display: flex; align-items: center; gap: 10px; }
        input[type="color"] { border: none; width: 40px; height: 40px; cursor: pointer; background: none; }

        h1 { text-align: center; color: var(--accent); }
        .category-block { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        h2 { border-bottom: 2px solid var(--accent); padding-bottom: 5px; color: var(--accent); }
        
        .item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; }
        .item-text { flex-grow: 1; margin-right: 10px; }
        
        .btn-group { display: flex; gap: 5px; }
        button { cursor: pointer; padding: 5px 10px; border-radius: 4px; border: none; font-weight: bold; }
        .edit-btn { background: var(--edit); color: white; }
        .del-btn { background: var(--del); color: white; }
        input[type="text"] { padding: 10px; width: calc(100% - 22px); border-radius: 6px; border: none; background: #2a2535; color: white; margin-top: 10px; }
        .add-btn { background: var(--accent); color: #000; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WATCHLIST</h1>
        
        <div class="settings-panel">
            <div class="setting-item">Фон: <input type="color" id="bgPicker" onchange="updateColors()"></div>
            <div class="setting-item">Акцент: <input type="color" id="accentPicker" onchange="updateColors()"></div>
        </div>

        <div id="app">Загрузка данных...</div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "ВАШ_API_KEY",
            authDomain: "watchlist-5c90e.firebaseapp.com",
            projectId: "watchlist-5c90e",
            storageBucket: "watchlist-5c90e.firebasestorage.app",
            messagingSenderId: "410347694098",
            appId: "1:410347694098:web:3539875f65d638a5f790cb"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function applyColors(bg, accent) {
            document.documentElement.style.setProperty('--bg', bg);
            document.documentElement.style.setProperty('--card', bg === '#0d0a15' ? '#1a1525' : '#222');
            document.documentElement.style.setProperty('--accent', accent);
            if(document.getElementById('bgPicker')) document.getElementById('bgPicker').value = bg;
            if(document.getElementById('accentPicker')) document.getElementById('accentPicker').value = accent;
        }

        function updateColors() {
            const bg = document.getElementById('bgPicker').value;
            const accent = document.getElementById('accentPicker').value;
            db.collection("watchlist").doc("myList").set({ settings: { bg, accent } }, { merge: true });
        }

        db.collection("watchlist").doc("myList").onSnapshot(doc => {
            const data = doc.data();
            if (!data) return;
            const settings = data.settings || { bg: '#0d0a15', accent: '#00e676' };
            applyColors(settings.bg, settings.accent);
            render(data);
        });

        function render(data) {
            const app = document.getElementById('app');
            app.innerHTML = '';
            ["Фильмы", "Аниме", "Сериалы"].forEach(cat => {
                const list = data[cat] || [];
                const section = document.createElement('div');
                section.className = 'category-block';
                section.innerHTML = `<h2>${cat}</h2>` + 
                    list.map((item, idx) => `
                        <div class="item">
                            <span class="item-text">${idx + 1}. ${item}</span>
                            <div class="btn-group">
                                <button class="edit-btn" onclick="editItem('${cat}', ${idx}, '${item.replace(/'/g, "\\'")}')">Изменить</button>
                                <button class="del-btn" onclick="deleteItem('${cat}', ${idx})">Удалить</button>
                            </div>
                        </div>`).join('') +
                    `<input type="text" id="input-${cat}" placeholder="Добавить...">
                     <button class="add-btn" onclick="addItem('${cat}')">Добавить</button>`;
                app.appendChild(section);
            });
        }

        function addItem(cat) {
            const input = document.getElementById(`input-${cat}`);
            const val = input.value;
            if (!val) return;
            db.collection("watchlist").doc("myList").update({ [cat]: firebase.firestore.FieldValue.arrayUnion(val) })
                .then(() => input.value = '');
        }

        function deleteItem(cat, idx) {
            db.collection("watchlist").doc("myList").get().then(doc => {
                const data = doc.data();
                if(data[cat]) {
                    data[cat].splice(idx, 1);
                    db.collection("watchlist").doc("myList").update({ [cat]: data[cat] });
                }
            });
        }

        function editItem(cat, idx, oldVal) {
            const newVal = prompt("Изменить название:", oldVal);
            if (!newVal || newVal === oldVal) return;
            db.collection("watchlist").doc("myList").get().then(doc => {
                const data = doc.data();
                if(data[cat]) {
                    data[cat][idx] = newVal;
                    db.collection("watchlist").doc("myList").update({ [cat]: data[cat] });
                }
            });
        }
    </script>
</body>
</html>
