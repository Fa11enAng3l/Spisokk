<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WatchList Pro</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        :root { 
            --bg: #0d0a15; --card: #1a1525; --accent: #00e676; 
            --edit: #448aff; --del: #ff5252;
        }
        body { 
            margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; 
            background: var(--bg); color: #fff; min-height: 100vh;
            background-size: cover; background-attachment: fixed;
        }
        .container { max-width: 600px; margin: 0 auto; }
        .stats-header { text-align: center; margin-bottom: 20px; }
        .stats-badge { background: var(--accent); color: #000; padding: 5px 15px; border-radius: 20px; font-weight: bold; }
        
        .settings-panel { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; display: grid; gap: 10px; }
        .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        
        input { padding: 8px; border-radius: 6px; border: none; background: #2a2535; color: white; }
        button { cursor: pointer; padding: 5px 10px; border-radius: 4px; border: none; font-weight: bold; background: #3a3a4a; color: white; }
        
        .category-block { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        h2 { color: var(--accent); border-bottom: 2px solid var(--accent); padding-bottom: 5px; }
        
        .item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #333; }
        .btn-group { display: flex; gap: 5px; }
        .rating-badge { cursor: pointer; padding: 3px 9px; border-radius: 20px; font-size: 12px; border: 1px solid var(--accent); background: #2a2535; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WATCHLIST</h1>
        <div class="stats-header">
            Общий средний балл: <span id="totalAvg" class="stats-badge">0</span>
        </div>
        
        <div class="settings-panel">
            <div class="controls">
                <input type="text" id="bgInput" placeholder="URL фона/код цвета/градиент">
                <input type="file" id="bgFile" accept="image/*" onchange="handleFileUpload(this)">
                <input type="color" id="accentPicker" onchange="saveSettings()">
                <button onclick="saveSettings()">Применить</button>
            </div>
        </div>

        <div id="app">Загрузка...</div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyBTtkGKIVzdK9rk-9HqXBa9hYdzH-n7Dh0", authDomain: "watchlist-5c90e.firebaseapp.com", projectId: "watchlist-5c90e", storageBucket: "watchlist-5c90e.firebasestorage.app", messagingSenderId: "410347694098", appId: "1:410347694098:web:3539875f65d638a5f790cb" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        let cachedData = null;

        db.collection("watchlist").doc("myList").onSnapshot(doc => {
            if (doc.exists) { cachedData = doc.data(); renderApp(); }
        });

        function toObj(item) { return typeof item === 'string' ? { name: item, watched: false, rating: null } : item; }

        function renderApp() {
            if (!cachedData) return;
            const settings = cachedData.settings || {};
            
            // Применяем настройки фона
            document.body.style.background = settings.bg || '#0d0a15';
            document.documentElement.style.setProperty('--accent', settings.accent || '#00e676');
            document.getElementById('accentPicker').value = settings.accent || '#00e676';
            document.getElementById('bgInput').value = settings.bg || '';

            // Считаем общую статистику
            calculateTotalStats();

            const app = document.getElementById('app');
            app.innerHTML = '';
            
            ["Фильмы", "Аниме", "Сериалы"].forEach(cat => {
                const list = (cachedData[cat] || []).map(toObj);
                const section = document.createElement('div');
                section.className = 'category-block';
                section.innerHTML = `<h2>${cat}</h2>` + list.map((obj, idx) => `
                    <div class="item">
                        <span>${obj.name}</span>
                        <span class="rating-badge" onclick="rateItem('${cat}', ${idx})">
                            ${obj.rating ? `Я:${obj.rating.me} | Она:${obj.rating.gf}` : 'Оценить'}
                        </span>
                        <div class="btn-group">
                            <button onclick="deleteItem('${cat}', ${idx})">✕</button>
                        </div>
                    </div>`).join('');
                app.appendChild(section);
            });
        }

        function calculateTotalStats() {
            let sum = 0, count = 0;
            ["Фильмы", "Аниме", "Сериалы"].forEach(cat => {
                (cachedData[cat] || []).map(toObj).forEach(o => {
                    if (o.rating && (o.rating.me > 0 || o.rating.gf > 0)) {
                        sum += ((o.rating.me || 0) + (o.rating.gf || 0)) / ((o.rating.me > 0 && o.rating.gf > 0) ? 2 : 1);
                        count++;
                    }
                });
            });
            document.getElementById('totalAvg').innerText = count > 0 ? (sum / count).toFixed(1) : "—";
        }

        function saveSettings() {
            db.collection("watchlist").doc("myList").update({
                "settings.bg": document.getElementById('bgInput').value,
                "settings.accent": document.getElementById('accentPicker').value
            });
        }

        function handleFileUpload(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = e => {
                db.collection("watchlist").doc("myList").update({ "settings.bg": `url('${e.target.result}')` });
            };
            reader.readAsDataURL(file);
        }

        function rateItem(cat, idx) {
            const list = cachedData[cat].map(toObj);
            const r = list[idx].rating || { me: 0, gf: 0 };
            const me = prompt("Ваша оценка:", r.me);
            const gf = prompt("Оценка девушки:", r.gf);
            if (me !== null && gf !== null) {
                list[idx].rating = { me: parseFloat(me), gf: parseFloat(gf) };
                db.collection("watchlist").doc("myList").update({ [cat]: list });
            }
        }
        
        function deleteItem(cat, idx) { 
            const list = cachedData[cat]; list.splice(idx, 1); 
            db.collection("watchlist").doc("myList").update({ [cat]: list }); 
        }
    </script>
</body>
</html>
